name: ASRAX Web Publish

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "vite.config.ts"
      - ".github/workflows/**"
  pull_request:
    branches: [ main ]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "vite.config.ts"

jobs:
  # ── Detect Changes ─────────────────────────────────────────────────────────
  # Adapted from your reference, though currently one main module exists
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      webapp: ${{ steps.check.outputs.webapp }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        id: check
        run: |
          # For a single module repo, we always build on relevant path changes
          echo "webapp=true" >> $GITHUB_OUTPUT

  # ── Build and Quality Check ────────────────────────────────────────────────
  build:
    name: Build & Quality Check
    needs: detect-changes
    if: needs.detect-changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint & Type Check
        run: npm run lint

      - name: Build Web Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: asrax-dist
          path: dist/

  # ── Publish / Deploy (Simulation of your workflow logic) ───────────────────
  publish-web:
    name: Publish Web App
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Publish to Registry
        run: |
          echo "Publishing ASRAX Web App..."
          echo "Target Namespace: am-apps-prod"
          echo "Image Name: asrax-frontend"
