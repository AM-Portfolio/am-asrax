name: ASRAX Web Publish

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "vite.config.ts"
      - "helm/**"
      - "Dockerfile"
      - "nginx.conf"
      - ".github/workflows/**"

  pull_request:
    branches: [ main ]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "vite.config.ts"
      - "helm/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-webapp:
    name: Publish ASRAX Web
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@develop
    with:
      language: "react"
      working_directory: "."
      image_name: "am-asrax-ui"
      build_context: "."
      dev_namespace: "am-apps-dev"
      prod_namespace: "am-apps-prod"
      deploy_prod: true
    secrets: inherit

