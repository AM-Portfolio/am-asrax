## Base values for am-asrax service
## Standardized for the AM-Portfolio Universal Chart

replicaCount: 1
port: 8080
language: react

image:
  repository: am-asrax-ui

service:
  type: ClusterIP
  port: 8080

# Health probe configuration for Nginx
probes:
  port: 8080
  liveness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 30
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

# Resource requirements (Small frontend footprint)
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: asrax.local
      paths:
        - path: /
          pathType: Prefix

# Safety Blocks (Required by Universal Chart)
vault:
  enabled: false

autoscaling:
  enabled: false

monitoring:
  enabled: false

# Default environment variables
env:
  NODE_ENV: "production"

